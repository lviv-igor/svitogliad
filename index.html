<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ТеоТест</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  .screen {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100dvh;
  }
  .screen.active { display: flex; }

  /* ===== HOME ===== */
  #home {
    justify-content: center;
    align-items: center;
    padding: 5vw;
    gap: 4vh;
  }
  .home-logo {
    font-size: clamp(44px, 20vw, 100px);
    font-weight: 100;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    width: 100%;
  }
  .home-logo span { color: #cc0000; }
  .home-subtitle {
    font-size: clamp(13px, 3.5vw, 18px);
    color: #aaa;
    text-align: center;
    font-weight: 300;
  }
  .home-subtitle span { color: #cc0000; }
  .btn-start {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(14px, 3vh, 22px) 40px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 400;
    letter-spacing: 3px;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
    text-transform: uppercase;
  }

  /* ===== QUESTION SCREEN ===== */
  #question-screen {
    justify-content: space-between;
    height: 100dvh;
    overflow: hidden;
  }

  .q-header {
    flex-shrink: 0;
    background: #000;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    text-align: center;
    border-bottom: 1px solid #222;
  }
  .q-logo { font-size: clamp(28px, 4vw, 42px); font-weight: 300; letter-spacing: 2px; }
  .q-logo span { color: #cc0000; }

  .q-body {
    flex: 1;
    min-height: 0;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .q-label-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-label {
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 300;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
  }
  .q-hint-btn {
    background: #cc0000;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: clamp(20px, 5vw, 26px);
    height: clamp(20px, 5vw, 26px);
    font-size: clamp(12px, 3vw, 15px);
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-text {
    font-size: clamp(24px, 4.5vw, 36px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: clamp(6px, 1.5vh, 14px);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .q-options-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .q-options { display: flex; flex-direction: column; gap: clamp(5px, 1.2vh, 10px); }
  .q-option {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 300;
  }
  .q-option input[type="radio"] {
    appearance: none;
    -webkit-appearance: none;
    width: clamp(16px, 4vw, 20px);
    height: clamp(16px, 4vw, 20px);
    border: 2px solid #fff;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
  }
  .q-option input[type="radio"]:checked { background: #cc0000; border-color: #cc0000; }
  .q-custom-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    color: #fff;
    font-size: clamp(22px, 3.5vw, 32px);
    padding: 2px 0;
    width: 100%;
    outline: none;
  }

  .q-notes {
    background: #fff;
    color: #333;
    border: none;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: clamp(12px, 3vw, 14px);
    resize: none;
    height: clamp(44px, 8vh, 70px);
    width: 100%;
    outline: none;
    margin-top: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-notes::placeholder { color: #999; }

  .q-scale { display: flex; gap: clamp(4px, 1.5vw, 8px); flex-wrap: wrap; margin-bottom: clamp(6px, 1.5vh, 12px); }
  .scale-btn {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 4px;
    width: clamp(30px, 8vw, 42px);
    height: clamp(30px, 8vw, 42px);
    font-size: clamp(22px, 3.5vw, 32px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scale-btn.selected { background: #cc0000; border-color: #cc0000; }

  .q-footer { flex-shrink: 0; }
  .btn-next {
    background: #000;
    color: #fff;
    border: none;
    border-top: 2px solid #333;
    width: 100%;
    padding: clamp(14px, 3.5vh, 28px) 0;
    font-size: clamp(42px, 8vw, 62px);
    font-weight: 300;
    letter-spacing: 6px;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
  }
  .btn-next:active { background: #111; }

  /* ===== HINT OVERLAY ===== */
  .hint-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .hint-overlay.active { display: flex; }
  .hint-box {
    background: #111;
    border: 1px solid #cc0000;
    border-radius: 10px;
    padding: 22px;
    max-width: 340px;
    width: 100%;
    position: relative;
  }
  .hint-title { color: #cc0000; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
  .hint-text { font-size: clamp(13px, 3.5vw, 15px); font-weight: 300; line-height: 1.6; color: #ddd; }
  .hint-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }

  /* ===== RESULT ===== */
  #result-screen {
    justify-content: center;
    align-items: center;
    padding: 30px 20px;
    text-align: center;
    gap: clamp(12px, 3vh, 24px);
    overflow-y: auto;
  }
  .result-logo { font-size: clamp(18px, 5vw, 24px); font-weight: 300; letter-spacing: 2px; }
  .result-logo span { color: #cc0000; }
  .result-emoji { font-size: clamp(48px, 15vw, 80px); }
  .result-title { font-size: clamp(20px, 6vw, 28px); font-weight: 300; letter-spacing: 2px; }
  .result-desc { font-size: clamp(13px, 3.5vw, 15px); font-weight: 300; color: #aaa; line-height: 1.6; max-width: 300px; }
  .result-verse { font-size: clamp(13px, 3.5vw, 16px); font-weight: 300; color: #ccc; line-height: 1.6; font-style: italic; max-width: 300px; }
  .result-ref { color: #cc0000; font-size: clamp(11px, 3vw, 14px); }
  .btn-restart {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(12px, 2.5vh, 18px) 40px;
    font-size: clamp(14px, 3.5vw, 17px);
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    width: 100%;
    max-width: 300px;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-logo">ТЕО<span>ТЕСТ</span></div>
  <div class="home-subtitle">10 запитань. <span>Назавжди</span> жити з відповідями.</div>
  <button class="btn-start" onclick="startTest()">РОЗПОЧАТИ ТЕСТ</button>
</div>

<!-- QUESTION -->
<div id="question-screen" class="screen">
  <div class="q-header">
    <div class="q-logo">ТЕО<span>ТЕСТ</span></div>
  </div>
  <div class="q-body" id="qBody"></div>
  <div class="q-footer">
    <button class="btn-next" onclick="nextQuestion()">ДАЛІ ›</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-logo">ТЕО<span>ТЕСТ</span></div>
  <div class="result-emoji" id="resultEmoji"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-desc" id="resultDesc"></div>
  <div class="result-verse" id="resultVerse"></div>
  <div class="result-ref" id="resultRef"></div>
  <button class="btn-restart" onclick="restartTest()">ПОЧАТИ ЗНОВУ</button>
</div>

<!-- HINT OVERLAY -->
<div class="hint-overlay" id="hintOverlay" onclick="closeHint(event)">
  <div class="hint-box">
    <button class="hint-close" onclick="closeHintBtn()">✕</button>
    <div class="hint-title">Підказка для ведучого</div>
    <div class="hint-text" id="hintText"></div>
  </div>
</div>

<script>

// ===== СТАН =====
var phase = "common";
var commonIdx = 0;
var branchIdx = 0;
var branchQuestions = [];
var commonAnswers = [null, null];
var branchAnswers = [];

// ===== СТАРТ =====
function startTest() {
  phase = "common";
  commonIdx = 0;
  branchIdx = 0;
  branchQuestions = [];
  commonAnswers = [null, null];
  branchAnswers = [];
  showScreen("question-screen");
  renderCurrent();
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function getQuestionNumber() {
  if (phase === "common") return commonIdx + 1;
  return 2 + branchIdx + 1;
}

// ===== РЕНДЕР =====
function renderCurrent() {
  var q = phase === "common" ? questionsCommon[commonIdx] : branchQuestions[branchIdx];
  var num = getQuestionNumber();
  var body = document.getElementById("qBody");
  var savedAns = phase === "common" ? commonAnswers[commonIdx] : branchAnswers[branchIdx];

  var html =
    '<div class="q-label-row">' +
      '<div class="q-label">ЗАПИТАННЯ ' + num + '</div>' +
      '<button class="q-hint-btn" onclick=\'showHint(' + JSON.stringify(q.hint) + ')\'> ? </button>' +
    '</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="q-options-wrap">';

  if (q.type === "radio") {
    html += '<div class="q-options">';
    for (var i = 0; i < q.options.length; i++) {
      var chk = (savedAns && savedAns.value === q.options[i]) ? " checked" : "";
      html += '<label class="q-option"><input type="radio" name="qr" value="' + q.options[i] + '"'+ chk +'> ' + q.options[i] + '</label>';
    }
    if (q.custom) {
      var cVal = (savedAns && savedAns.custom) ? savedAns.custom : "";
      var cChk = (savedAns && savedAns.value === "__custom__") ? " checked" : "";
      html += '<label class="q-option"><input type="radio" name="qr" value="__custom__"' + cChk + '> ' +
        '<input class="q-custom-input" id="customInput" type="text" placeholder="' + q.custom + '" value="' + cVal + '"></label>';
    }
    html += '</div>';
  } else if (q.type === "scale") {
    var savedVal = savedAns ? savedAns.value : null;
    html += '<div class="q-scale">';
    for (var j = 1; j <= 10; j++) {
      var isSel = (savedVal == j) ? " selected" : "";
      html += '<button class="scale-btn' + isSel + '" onclick="selectScale(this,' + j + ')">' + j + '</button>';
    }
    html += '</div>';
  }

  html += '</div>';
  var savedNotes = (savedAns && savedAns.notes) ? savedAns.notes : "";
  html += '<textarea class="q-notes" placeholder="Нотатки ведучого...">' + savedNotes + '</textarea>';
  body.innerHTML = html;
}

// ===== ДАЛІ =====
function nextQuestion() {
  saveCurrentAnswer();

  if (phase === "common") {
    if (commonIdx === 0) {
      commonIdx = 1;
      renderCurrent();
      return;
    }
    if (commonIdx === 1) {
      var ans2 = commonAnswers[1];
      var val = ans2 ? ans2.value : "";
      if (val === "Так, це Бог") {
        phase = "theist";
        branchQuestions = questionsTheist;
      } else {
        phase = "skeptic";
        branchQuestions = questionsSkeptic;
      }
      branchIdx = 0;
      branchAnswers = new Array(branchQuestions.length).fill(null);
      renderCurrent();
      return;
    }
  }

  if (phase === "theist" || phase === "skeptic") {
    branchIdx++;
    if (branchIdx >= branchQuestions.length) {
      showResult();
      return;
    }
    renderCurrent();
  }
}

// ===== ЗБЕРЕГТИ ВІДПОВІДЬ =====
function saveCurrentAnswer() {
  var q = phase === "common" ? questionsCommon[commonIdx] : branchQuestions[branchIdx];
  var notesEl = document.querySelector(".q-notes");
  var notes = notesEl ? notesEl.value : "";
  var ans;
  if (q.type === "radio") {
    var sel = document.querySelector('input[name="qr"]:checked');
    var ci = document.getElementById("customInput");
    ans = { value: sel ? sel.value : null, custom: ci ? ci.value : "", notes: notes };
  } else {
    var sb = document.querySelector(".scale-btn.selected");
    ans = { value: sb ? parseInt(sb.textContent) : null, notes: notes };
  }
  if (phase === "common") commonAnswers[commonIdx] = ans;
  else branchAnswers[branchIdx] = ans;
}

// ===== ШКАЛА =====
function selectScale(btn, val) {
  var btns = document.querySelectorAll(".scale-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("selected");
  btn.classList.add("selected");
}

// ===== ПІДКАЗКА =====
function showHint(text) {
  document.getElementById("hintText").textContent = text;
  document.getElementById("hintOverlay").classList.add("active");
}
function closeHint(e) {
  if (e.target === document.getElementById("hintOverlay"))
    document.getElementById("hintOverlay").classList.remove("active");
}
function closeHintBtn() {
  document.getElementById("hintOverlay").classList.remove("active");
}

// ===== АЛГОРИТМ ВИЗНАЧЕННЯ ПРОФІЛЮ =====
function determineProfile() {

  if (phase === "theist") {
    var a = branchAnswers;
    // Пит 5 (idx 4): Ким є Ісус
    var jesusAns = a[4] ? a[4].value : "";
    // Пит 6 (idx 5): Воскресіння
    var resAns = a[5] ? a[5].value : "";
    // Пит 3 (idx 2): Рай
    var heavenAns = a[2] ? a[2].value : "";
    // Пит 1 (idx 0): Опис Бога
    var godDescAns = a[0] ? a[0].value : "";
    // Пит 2 (idx 1): Піклування
    var careAns = a[1] ? a[1].value : "";

    // Пріоритет 1: Христологія — Християнський теїст
    if (jesusAns === "Сином Божим і Спасителем" && resAns === "Так, це історичний факт") {
      return "christian";
    }
    if (jesusAns === "Сином Божим і Спасителем") {
      return "christian";
    }

    // Пріоритет 2: Деїзм
    if (godDescAns === "Великий Архітектор Всесвіту" || careAns === "Він створив світ, але не втручається") {
      return "deist";
    }

    // Пріоритет 3: Пантеїзм/Панентеїзм
    if (jesusAns === "Добрим учителем і пророком" && careAns === "Він створив світ, але не втручається") {
      return "panentheist";
    }
    if (heavenAns === "Вірю в реінкарнацію") {
      return "pantheist";
    }

    // Пріоритет 4: Загальний теїст
    return "christian";

  } else {
    // ГІЛКА СКЕПТИКА
    var sa = branchAnswers;
    // Пит 7 (idx 6): Шкала переконаності
    var scaleAns = sa[6] ? sa[6].value : null;
    // Пит 8 (idx 7): Чи хочуть почути теїстів
    var openAns = sa[7] ? sa[7].value : "";
    // Пит 1 (idx 0): Що заважає вірити
    var blockAns = sa[0] ? sa[0].value : "";
    // Пит 4 (idx 3): Мораль
    var moralAns = sa[3] ? sa[3].value : "";
    // Пит 5 (idx 4): Сенс всесвіту
    var meaningAns = sa[4] ? sa[4].value : "";
    // Пит 6 (idx 5): Після смерті
    var afterAns = sa[5] ? sa[5].value : "";

    // Пріоритет 1: Політеїст
    if (blockAns === "Вірю в багатьох богів, а не одного") {
      return "polytheist";
    }

    // Пріоритет 2: Апатеїст
    if (openAns === "Ні, мене це не цікавить" && meaningAns === "Ні, все випадково і безглуздо") {
      return "apatheist";
    }

    // Пріоритет 3: Атеїст (висока шкала)
    if (scaleAns !== null && scaleAns >= 8) {
      return "atheist";
    }

    // Пріоритет 4: Нігіліст
    if (meaningAns === "Ні, все випадково і безглуздо" && afterAns === "Нічого — просто кінець") {
      return "nihilist";
    }

    // Пріоритет 5: Релятивіст
    if (moralAns === "Мораль відносна — кожен вирішує сам") {
      return "relativist";
    }

    // Пріоритет 6: Екзистенціаліст
    if (meaningAns === "Сенс створюємо ми самі") {
      return "existentialist";
    }

    // Пріоритет 7: Натураліст
    if (blockAns === "Протиріччя з наукою" && moralAns === "На еволюції та інстинктах") {
      return "naturalist";
    }

    // Пріоритет 8: Гуманіст
    if (moralAns === "На соціальних нормах" || moralAns === "На власних відчуттях") {
      if (meaningAns === "Так, я відчуваю якийсь сенс") {
        return "humanist";
      }
    }

    // Пріоритет 9: Агностик (низька шкала)
    if (scaleAns !== null && scaleAns <= 4) {
      return "agnostic";
    }

    // Пріоритет 10: Апатеїст (відкрите питання — ні)
    if (openAns === "Ні, мене це не цікавить") {
      return "apatheist";
    }

    // За замовчуванням
    if (scaleAns !== null && scaleAns >= 5) {
      return "atheist";
    }
    return "agnostic";
  }
}

// ===== РЕЗУЛЬТАТ =====
function showResult() {
  var profileKey = determineProfile();
  var p = profiles[profileKey];
  showScreen("result-screen");
  document.getElementById("resultEmoji").textContent = p.emoji;
  document.getElementById("resultTitle").textContent = p.title;
  document.getElementById("resultDesc").textContent = p.desc;
  document.getElementById("resultVerse").textContent = p.verse;
  document.getElementById("resultRef").textContent = p.ref;
}

// ===== РЕСТАРТ =====
function restartTest() {
  showScreen("home");
}
