<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ТеоТест</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  .screen {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100dvh;
  }
  .screen.active { display: flex; }

  /* ===== HOME ===== */
  #home {
    justify-content: center;
    align-items: center;
    padding: 5vw;
    gap: 4vh;
  }
  .home-logo {
    font-size: clamp(44px, 20vw, 100px);
    font-weight: 100;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    width: 100%;
  }
  .home-logo span { color: #cc0000; }
  .home-subtitle {
    font-size: clamp(13px, 3.5vw, 18px);
    color: #aaa;
    text-align: center;
    font-weight: 300;
  }
  .home-subtitle span { color: #cc0000; }
  .btn-start {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(14px, 3vh, 22px) 40px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 400;
    letter-spacing: 3px;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
    text-transform: uppercase;
  }

  /* ===== QUESTION SCREEN ===== */
  #question-screen {
    justify-content: space-between;
    height: 100dvh;
    overflow: hidden;
  }

  .q-header {
    flex-shrink: 0;
    background: #000;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    text-align: center;
    border-bottom: 1px solid #222;
  }
  .q-logo { font-size: clamp(28px, 4vw, 42px); font-weight: 300; letter-spacing: 2px; }
  .q-logo span { color: #cc0000; }
  .q-progress { height: 3px; background: #222; margin-top: 6px; }
  .q-progress-bar { height: 3px; background: #cc0000; transition: width 0.3s; }

  .q-body {
    flex: 1;
    min-height: 0;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .q-label-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-label {
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 300;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
  }
  .q-hint-btn {
    background: #cc0000;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: clamp(20px, 5vw, 26px);
    height: clamp(20px, 5vw, 26px);
    font-size: clamp(12px, 3vw, 15px);
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-text {
    font-size: clamp(24px, 4.5vw, 36px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: clamp(6px, 1.5vh, 14px);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .q-options-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .q-options { display: flex; flex-direction: column; gap: clamp(5px, 1.2vh, 10px); }
  .q-option {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 300;
  }
  .q-option input[type="radio"] {
    appearance: none;
    -webkit-appearance: none;
    width: clamp(16px, 4vw, 20px);
    height: clamp(16px, 4vw, 20px);
    border: 2px solid #fff;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
  }
  .q-option input[type="radio"]:checked { background: #cc0000; border-color: #cc0000; }
  .q-custom-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    color: #fff;
    font-size: clamp(22px, 3.5vw, 32px);
    padding: 2px 0;
    width: 100%;
    outline: none;
  }

  .q-notes {
    background: #fff;
    color: #333;
    border: none;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: clamp(12px, 3vw, 14px);
    resize: none;
    height: clamp(44px, 8vh, 70px);
    width: 100%;
    outline: none;
    margin-top: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-notes::placeholder { color: #999; }

  .q-scale { display: flex; gap: clamp(4px, 1.5vw, 8px); flex-wrap: wrap; margin-bottom: clamp(6px, 1.5vh, 12px); }
  .scale-btn {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 4px;
    width: clamp(30px, 8vw, 42px);
    height: clamp(30px, 8vw, 42px);
    font-size: clamp(22px, 3.5vw, 32px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scale-btn.selected { background: #cc0000; border-color: #cc0000; }

  .q-footer { flex-shrink: 0; }
  .btn-next {
    background: #000;
    color: #fff;
    border: none;
    border-top: 2px solid #333;
    width: 100%;
    padding: clamp(14px, 3.5vh, 28px) 0;
    font-size: clamp(42px, 8vw, 62px);
    font-weight: 300;
    letter-spacing: 6px;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
  }
  .btn-next:active { background: #111; }

  /* ===== HINT OVERLAY ===== */
  .hint-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .hint-overlay.active { display: flex; }
  .hint-box {
    background: #111;
    border: 1px solid #cc0000;
    border-radius: 10px;
    padding: 22px;
    max-width: 340px;
    width: 100%;
    position: relative;
  }
  .hint-title { color: #cc0000; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
  .hint-text { font-size: clamp(13px, 3.5vw, 15px); font-weight: 300; line-height: 1.6; color: #ddd; }
  .hint-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }

  /* ===== RESULT ===== */
  #result-screen { justify-content: center; align-items: center; padding: 30px 20px; text-align: center; gap: clamp(12px, 3vh, 24px); }
  .result-logo { font-size: clamp(18px, 5vw, 24px); font-weight: 300; letter-spacing: 2px; }
  .result-logo span { color: #cc0000; }
  .result-emoji { font-size: clamp(48px, 15vw, 80px); }
  .result-profile { font-size: clamp(11px, 3vw, 13px); letter-spacing: 4px; color: #cc0000; text-transform: uppercase; }
  .result-title { font-size: clamp(20px, 6vw, 28px); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
  .result-desc { font-size: clamp(12px, 3vw, 14px); font-weight: 300; color: #aaa; line-height: 1.6; max-width: 300px; }
  .result-verse { font-size: clamp(13px, 3.5vw, 16px); font-weight: 300; color: #ccc; line-height: 1.6; font-style: italic; max-width: 300px; }
  .result-ref { color: #cc0000; font-size: clamp(11px, 3vw, 14px); }
  .btn-restart {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(12px, 2.5vh, 18px) 40px;
    font-size: clamp(14px, 3.5vw, 17px);
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    width: 100%;
    max-width: 300px;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-logo">ТЕО<span>ТЕСТ</span></div>
  <div class="home-subtitle">10 запитань. <span>Назавжди</span> жити з відповідями.</div>
  <button class="btn-start" onclick="startTest()">РОЗПОЧАТИ ТЕСТ</button>
</div>

<!-- QUESTION -->
<div id="question-screen" class="screen">
  <div class="q-header">
    <div class="q-logo">ТЕО<span>ТЕСТ</span></div>
    <div class="q-progress"><div class="q-progress-bar" id="progressBar"></div></div>
  </div>
  <div class="q-body" id="qBody"></div>
  <div class="q-footer">
    <button class="btn-next" onclick="nextQuestion()">ДАЛІ ›</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-logo">ТЕО<span>ТЕСТ</span></div>
  <div class="result-emoji" id="resultEmoji"></div>
  <div class="result-profile" id="resultProfile"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-desc" id="resultDesc"></div>
  <div class="result-verse" id="resultVerse"></div>
  <div class="result-ref" id="resultRef"></div>
  <button class="btn-restart" onclick="restartTest()">ПОЧАТИ ЗНОВУ</button>
</div>

<!-- HINT OVERLAY -->
<div class="hint-overlay" id="hintOverlay" onclick="closeHint(event)">
  <div class="hint-box">
    <button class="hint-close" onclick="closeHintBtn()">✕</button>
    <div class="hint-title">Підказка для ведучого</div>
    <div class="hint-text" id="hintText"></div>
  </div>
</div>

<script>
// ===== СПІЛЬНІ ПИТАННЯ (1-2) =====
var questionsCommon = [
  {
    q: "ДОБРО І ЗЛО РЕАЛЬНІ, ЧИ ПРОСТО ДУМКИ ЛЮДЕЙ?",
    type: "radio",
    options: ["Так, є об'єктивне добро і зло", "Не впевнений/а", "Ні, це просто суспільні домовленості"],
    hint: "Питання про об'єктивну мораль. Якщо добро і зло реальні — звідки вони? Це відкриває розмову про Бога як джерело моральності."
  },
  {
    q: "ЧИ ІСНУЄ ЩОСЬ (ХТОСЬ) БІЛЬШЕ ЗА НАС?",

    options: [
      "Ні",
      "Не впевнений/а",
      "Так, це безособистісна Сила/Енергія/Всесвіт",
      "Так, це боги / вищі істоти",
      "Так, це Бог"
    ],
    hint: "Ключове розгалуження тесту. 'Так, це Бог' → гілка теїста. Усі інші відповіді → гілка скептика. 'Боги/вищі істоти' → потенційний профіль Політеїста."
  }
];

// ===== ГІЛКА ТЕЇСТА (питання 3-10) =====
var questionsTheist = [
  {
    q: "ЯК БИ ВИ ОПИСАЛИ БОГА?",
    type: "radio",
    options: ["Люблячий", "Святий", "Безособистісна Енергія", "Байдужий"],

  },
  {
    q: "ЧОГО ВІД НАС ОЧІКУЄ БОГ?",

  },
  {
    q: "ЧИ ВІРИТЕ ВИ У РАЙ?",

    hint: "Визначає базове розуміння вічності. Якщо реінкарнація — відкриває розмову про біблійне вчення про смерть і воскресіння."
  },
  {
    q: "ЧИ КОЖЕН ПОТРАПИТЬ ТУДИ?",

    q: "ЧИ ВИ ПОТРАПИТЕ В РАЙ?",

    q: "ЧОМУ ВИ ПОТРАПИТЕ В РАЙ?",

    hint: "Центральне питання тесту. 'Так, Бог спас мене через Христа' — привід для радості. Інші відповіді — привід пояснити Євангеліє."
  },
  {
    q: "ЧИ ВИ Б ХОТІЛИ ЗНАТИ, ЯК НА ЦІ ПИТАННЯ ВІДПОВІДАЄ БІБЛІЯ?",

    options: [
      "Знаю і погоджуюсь",
      "Знаю і не погоджуюсь",

    hint: "Фінальне питання. Якщо 'Хотів/ла би довідатись' — запрошення поділитись Євангелієм або запросити на Біблійні Основи."

// ===== ГІЛКА СКЕПТИКА (питання 3-10) =====

// ===== СТАН =====
var phase = "common";
var commonIdx = 0;
var branchIdx = 0;
var branchQuestions = [];
var commonAnswers = [null, null];
var branchAnswers = [];
var totalQuestions = 10;

// ===== СТАРТ =====
function startTest() {
  phase = "common";
  commonIdx = 0;
  branchIdx = 0;
  branchQuestions = [];
  commonAnswers = [null, null];
  branchAnswers = [];
  showScreen("question-screen");
  renderCurrent();
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function getProgress() {
  if (phase === "common") return Math.round(((commonIdx + 1) / totalQuestions) * 100);
  var done = 2 + branchIdx + 1;
  return Math.round((done / totalQuestions) * 100);
}

function getQuestionNumber() {
  if (phase === "common") return commonIdx + 1;
  return 2 + branchIdx + 1;
}

// ===== РЕНДЕР =====
function renderCurrent() {
  var q = phase === "common" ? questionsCommon[commonIdx] : branchQuestions[branchIdx];
  var num = getQuestionNumber();
  document.getElementById("progressBar").style.width = getProgress() + "%";
  var body = document.getElementById("qBody");

  var html =
    '<div class="q-label-row">' +
      '<div class="q-label">ЗАПИТАННЯ ' + num + '</div>' +
      '<button class="q-hint-btn" onclick='showHint(' + JSON.stringify(q.hint) + ')'>?</button>' +
    '</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="q-options-wrap">';

  var savedAns = phase === "common" ? commonAnswers[commonIdx] : branchAnswers[branchIdx];

  if (q.type === "radio") {
    html += '<div class="q-options">';
    for (var i = 0; i < q.options.length; i++) {
      var chk = (savedAns && savedAns.value === q.options[i]) ? " checked" : "";
      html += '<label class="q-option"><input type="radio" name="qr" value="' + q.options[i] + '"' + chk + '> ' + q.options[i] + '</label>';
    }
    if (q.custom) {
      var cVal = (savedAns && savedAns.custom) ? savedAns.custom : "";
      var cChk = (savedAns && savedAns.value === "__custom__") ? " checked" : "";
      html += '<label class="q-option"><input type="radio" name="qr" value="__custom__"' + cChk + '> ' +
        '<input class="q-custom-input" id="customInput" type="text" placeholder="' + q.custom + '" value="' + cVal + '"></label>';
    }
    html += '</div>';
  } else if (q.type === "scale") {
    var savedVal = savedAns ? savedAns.value : null;
    html += '<div class="q-scale">';
    for (var j = 1; j <= 10; j++) {
      var isSel = (savedVal == j) ? " selected" : "";
      html += '<button class="scale-btn' + isSel + '" onclick="selectScale(this,' + j + ')">' + j + '</button>';
    }
    html += '</div>';
  }

  html += '</div>';
  var savedNotes = (savedAns && savedAns.notes) ? savedAns.notes : "";
  html += '<textarea class="q-notes" placeholder="Нотатки ведучого...">' + savedNotes + '</textarea>';
  body.innerHTML = html;
}

// ===== ДАЛІ =====
function nextQuestion() {
  saveCurrentAnswer();

  if (phase === "common") {
    if (commonIdx === 0) {
      commonIdx = 1;
      renderCurrent();
      return;
    }
    if (commonIdx === 1) {
      var ans2 = commonAnswers[1];
      var val = ans2 ? ans2.value : "";
      if (val === "Так, це Бог") {
        phase = "theist";
        branchQuestions = questionsTheist;
      } else {
        phase = "skeptic";
        branchQuestions = questionsSkeptic;
      }
      branchIdx = 0;
      branchAnswers = new Array(branchQuestions.length).fill(null);
      renderCurrent();
      return;
    }
  }

  if (phase === "theist" || phase === "skeptic") {
    branchIdx++;
    if (branchIdx >= branchQuestions.length) {
      showResult();
      return;
    }
    renderCurrent();
  }
}

// ===== ЗБЕРЕГТИ ВІДПОВІДЬ =====
function saveCurrentAnswer() {
  var q = phase === "common" ? questionsCommon[commonIdx] : branchQuestions[branchIdx];
  var notesEl = document.querySelector(".q-notes");
  var notes = notesEl ? notesEl.value : "";
  var ans;
  if (q.type === "radio") {
    var sel = document.querySelector('input[name="qr"]:checked');
    var ci = document.getElementById("customInput");
    ans = { value: sel ? sel.value : null, custom: ci ? ci.value : "", notes: notes };
  } else {
    var sb = document.querySelector(".scale-btn.selected");
    ans = { value: sb ? parseInt(sb.dataset.val || sb.textContent) : null, notes: notes };
  }
  if (phase === "common") commonAnswers[commonIdx] = ans;
  else branchAnswers[branchIdx] = ans;
}

// ===== ШКАЛА =====
function selectScale(btn, val) {
  var btns = document.querySelectorAll(".scale-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("selected");
  btn.classList.add("selected");
  btn.dataset.val = val;
}

// ===== ПІДКАЗКА =====
function showHint(text) {
  document.getElementById("hintText").textContent = text;
  document.getElementById("hintOverlay").classList.add("active");
}
function closeHint(e) {
  if (e.target === document.getElementById("hintOverlay"))
    document.getElementById("hintOverlay").classList.remove("active");
}
function closeHintBtn() {
  document.getElementById("hintOverlay").classList.remove("active");
}

// ===== АЛГОРИТМ ВИЗНАЧЕННЯ ПРОФІЛЮ =====
function determineProfile() {
  if (phase === "theist") {
    // Пит 10 (idx 7): чи хоче знати Біблію
    var q10 = branchAnswers[7] ? branchAnswers[7].value : null;
    // Пит 9 (idx 6): чому потрапить у рай
    var q9 = branchAnswers[6] ? branchAnswers[6].value : null;
    // Пит 3 (idx 0): як описати Бога
    var q3 = branchAnswers[0] ? branchAnswers[0].value : null;

    // Пріоритет 1: Христос
    if (q9 === "Так, Бог спас мене через Христа") return "christian";
    if (q10 === "Знаю і погоджуюсь") return "christian";

    // Пріоритет 2: Деїст (Бог байдужий / нічого не очікує)
    var q4 = branchAnswers[1] ? branchAnswers[1].value : null;
    if (q4 === "Нічого" || q3 === "Байдужий") return "deist";

    // Пріоритет 3: Пантеїст / Панентеїст
    if (q3 === "Безособистісна Енергія") {
      // Якщо вірить у рай — панентеїст, якщо ні — пантеїст
      var q6 = branchAnswers[3] ? branchAnswers[3].value : null;
      if (q6 === "Так") return "panentheist";
      return "pantheist";
    }

    // За замовчуванням для теїстів
    return "panentheist";

  } else {
    // ГІЛКА СКЕПТИКА
    // Пит 10 (idx 7): чи хоче почути теїстів
    var s10 = branchAnswers[7] ? branchAnswers[7].value : null;
    // Пит 9 (idx 6): шкала переконаності (1-10)
    var s9 = branchAnswers[6] ? branchAnswers[6].value : null;
    // Пит 3 (idx 0): що заважає вірити
    var s3 = branchAnswers[0] ? branchAnswers[0].value : null;
    // Пит 5 (idx 2): ціль у всесвіті
    var s5 = branchAnswers[2] ? branchAnswers[2].value : null;
    // Пит 7 (idx 4): на чому базується мораль
    var s7 = branchAnswers[4] ? branchAnswers[4].value : null;
    // Пит 8 (idx 5): людське життя особливе?
    var s8 = branchAnswers[5] ? branchAnswers[5].value : null;

    // Пріоритет 1: Політеїст
    if (s3 === "Вірю в багатьох богів, а не одного") return "polytheist";

    // Пріоритет 2: Апатеїст (мораль "ні на чому" + ціль "ні" + шкала низька)
    if (s7 === "Ні на чому" && s5 === "Ні" && s10 === "Ні, не цікаво") return "apatheist";

    // Пріоритет 3: Нігіліст
    if (s7 === "Ні на чому" && s8 === "Ні") return "nihilist";

    // Пріоритет 4: Релятивіст
    if (s7 === "Соціальні норми" || s5 === "Не впевнений/а") return "relativist";

    // Пріоритет 5: Екзистенціаліст
    if (s5 === "Так" && s7 === "Почуття") return "existentialist";

    // Пріоритет 6: Натураліст
    if (s7 === "Еволюція" && s8 === "Ні") return "naturalist";

    // Пріоритет 7: Гуманіст
    if (s8 === "Так" && (s7 === "Еволюція" || s7 === "Соціальні норми")) return "humanist";

    // Пріоритет 8: Атеїст / Агностик за шкалою
    if (s9 !== null) {
      var scale = parseInt(s9);
      if (scale >= 8) return "atheist";
      if (scale >= 4) return "agnostic";
      if (scale <= 3) return "agnostic";
    }

    // За замовчуванням
    return "agnostic";
  }
}

// ===== РЕЗУЛЬТАТ =====
function showResult() {
  var key = determineProfile();
  var p = profiles[key];
  showScreen("result-screen");
  document.getElementById("resultEmoji").textContent = p.emoji;
  document.getElementById("resultProfile").textContent = p.profile;
  document.getElementById("resultTitle").textContent = p.title;
  document.getElementById("resultDesc").textContent = p.desc;
  document.getElementById("resultVerse").textContent = p.verse;
  document.getElementById("resultRef").textContent = p.ref;
}

// ===== РЕСТАРТ =====
function restartTest() {
  showScreen("home");
}
