<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ТеоТест</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  .screen {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100dvh;
  }
  .screen.active { display: flex; }

  /* ===== HOME ===== */
  #home {
    justify-content: center;
    align-items: center;
    padding: 5vw;
    gap: 4vh;
  }
  .home-logo {
    font-size: clamp(44px, 20vw, 100px);
    font-weight: 100;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    width: 100%;
  }
  .home-logo span { color: #cc0000; }
  .home-subtitle {
    font-size: clamp(13px, 3.5vw, 18px);
    color: #aaa;
    text-align: center;
    font-weight: 300;
  }
  .home-subtitle span { color: #cc0000; }
  .btn-start {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(14px, 3vh, 22px) 40px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 400;
    letter-spacing: 3px;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
    text-transform: uppercase;
  }

  /* ===== QUESTION SCREEN ===== */
  #question-screen {
    justify-content: space-between;
    height: 100dvh;
    overflow: hidden;
  }

  .q-header {
    flex-shrink: 0;
    background: #000;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    text-align: center;
    border-bottom: 1px solid #222;
  }
  .q-logo { font-size: clamp(28px, 4vw, 42px); font-weight: 300; letter-spacing: 2px; }
  .q-logo span { color: #cc0000; }
  .q-progress { height: 3px; background: #222; margin-top: 6px; }
  .q-progress-bar { height: 3px; background: #cc0000; transition: width 0.3s; }

  .q-body {
    flex: 1;
    min-height: 0;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .q-label-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-label {
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 300;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
  }
  .q-hint-btn {
    background: #cc0000;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: clamp(20px, 5vw, 26px);
    height: clamp(20px, 5vw, 26px);
    font-size: clamp(12px, 3vw, 15px);
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-text {
    font-size: clamp(24px, 4.5vw, 36px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: clamp(6px, 1.5vh, 14px);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .q-options-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .q-options { display: flex; flex-direction: column; gap: clamp(5px, 1.2vh, 10px); }
  .q-option {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 300;
  }
  .q-option input[type="radio"] {
    appearance: none;
    -webkit-appearance: none;
    width: clamp(16px, 4vw, 20px);
    height: clamp(16px, 4vw, 20px);
    border: 2px solid #fff;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
  }
  .q-option input[type="radio"]:checked { background: #cc0000; border-color: #cc0000; }
  .q-custom-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    color: #fff;
    font-size: clamp(22px, 3.5vw, 32px);
    padding: 2px 0;
    width: 100%;
    outline: none;
  }

  .q-notes {
    background: #fff;
    color: #333;
    border: none;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: clamp(12px, 3vw, 14px);
    resize: none;
    height: clamp(44px, 8vh, 70px);
    width: 100%;
    outline: none;
    margin-top: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-notes::placeholder { color: #999; }

  .q-scale { display: flex; gap: clamp(4px, 1.5vw, 8px); flex-wrap: wrap; margin-bottom: clamp(6px, 1.5vh, 12px); }
  .scale-btn {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 4px;
    width: clamp(30px, 8vw, 42px);
    height: clamp(30px, 8vw, 42px);
    font-size: clamp(22px, 3.5vw, 32px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scale-btn.selected { background: #cc0000; border-color: #cc0000; }

  .q-footer { flex-shrink: 0; }
  .btn-next {
    background: #000;
    color: #fff;
    border: none;
    border-top: 2px solid #333;
    width: 100%;
    padding: clamp(14px, 3.5vh, 28px) 0;
    font-size: clamp(42px, 8vw, 62px);
    font-weight: 300;
    letter-spacing: 6px;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
  }
  .btn-next:active { background: #111; }

  /* ===== HINT OVERLAY ===== */
  .hint-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .hint-overlay.active { display: flex; }
  .hint-box {
    background: #111;
    border: 1px solid #cc0000;
    border-radius: 10px;
    padding: 22px;
    max-width: 340px;
    width: 100%;
    position: relative;
  }
  .hint-title { color: #cc0000; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
  .hint-text { font-size: clamp(13px, 3.5vw, 15px); font-weight: 300; line-height: 1.6; color: #ddd; }
  .hint-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }

  /* ===== RESULT ===== */
  #result-screen { justify-content: center; align-items: center; padding: 30px 20px; text-align: center; gap: clamp(12px, 3vh, 24px); }
  .result-logo { font-size: clamp(18px, 5vw, 24px); font-weight: 300; letter-spacing: 2px; }
  .result-logo span { color: #cc0000; }
  .result-emoji { font-size: clamp(48px, 15vw, 80px); }
  .result-title { font-size: clamp(20px, 6vw, 28px); font-weight: 300; letter-spacing: 2px; }
  .result-desc { font-size: clamp(13px, 3.5vw, 15px); font-weight: 300; color: #aaa; line-height: 1.6; max-width: 300px; }
  .result-verse { font-size: clamp(13px, 3.5vw, 16px); font-weight: 300; color: #ccc; line-height: 1.6; font-style: italic; max-width: 300px; }
  .result-ref { color: #cc0000; font-size: clamp(11px, 3vw, 14px); }
  .btn-restart {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(12px, 2.5vh, 18px) 40px;
    font-size: clamp(14px, 3.5vw, 17px);
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    width: 100%;
    max-width: 300px;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-logo">СВІТО<span>ГЛЯД</span></div>
  <div class="home-subtitle">Створи свій світоглядний профіль</div>
  <button class="btn-start" id="btnStart">РОЗПОЧАТИ</button>
</div>

<!-- QUESTION -->
<div id="question-screen" class="screen">
  <div class="q-header">
    <div class="q-logo">ТЕО<span>ТЕСТ</span></div>
    <div class="q-progress"><div class="q-progress-bar" id="progressBar"></div></div>
  </div>
  <div class="q-body" id="qBody"></div>
  <div class="q-footer">
    <button class="btn-next" id="btnNext">ДАЛІ ›</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-logo">ТЕО<span>ТЕСТ</span></div>
  <div class="result-emoji" id="resultEmoji"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-desc" id="resultDesc"></div>
  <div class="result-verse" id="resultVerse"></div>
  <div class="result-ref" id="resultRef"></div>
  <button class="btn-restart" id="btnRestart">ПОЧАТИ ЗНОВУ</button>
</div>

<!-- HINT OVERLAY -->
<div class="hint-overlay" id="hintOverlay">
  <div class="hint-box">
    <button class="hint-close" id="hintCloseBtn">✕</button>
    <div class="hint-title">Підказка для ведучого</div>
    <div class="hint-text" id="hintText"></div>
  </div>
</div>

<script>
// ===== ПИТАННЯ =====

  {

    type: "radio",

    hint: "Питання про об'єктивну мораль. Якщо добро і зло реальні — звідки вони? Це відкриває розмову про Бога як джерело моральності."
  },
  {
    q: "ЧИ ІСНУЄ ЩОСЬ (ХТОСЬ) БІЛЬШЕ ЗА НАС?",
    type: "radio",
    options: ["Ні", "Не впевнений/а", "Так, це безособистісна Сила/Енергія/Всесвіт", "Так, це боги / вищі істоти", "Так, це Бог"],
    hint: "Ключове розгалуження тесту. 'Так, це Бог' → гілка теїста. Всі інші відповіді → гілка скептика."
  }
];

var questionsTheist = [
  {
    q: "ЯК БИ ВИ ОПИСАЛИ БОГА?",
    type: "radio",
    options: ["Люблячий", "Святий", "Безособистісна Енергія", "Байдужий"],
    custom: "Ваш варіант",
    hint: "Розкриває уявлення людини про природу Бога. Допомагає зрозуміти, з якого кута підходити до розмови про Євангеліє."
  },
  {
    q: "ЧОГО ВІД НАС ОЧІКУЄ БОГ?",
    type: "radio",
    options: ["Вірити в Нього", "Не шкодити іншим", "Дотримуватись правил", "Нічого"],
    custom: "Ваш варіант",
    hint: "Показує, чи розуміє людина концепцію благодаті. Якщо 'дотримуватись правил' — відкриває розмову про різницю між релігією і стосунками з Богом."
  },
  {

  },
  {
    q: "ЧИ ВІРИТЕ ВИ У РАЙ?",

    hint: "Визначає базове розуміння вічності. Якщо реінкарнація — відкриває розмову про біблійне вчення про смерть і воскресіння."
  },
  {
    q: "ЧИ КОЖЕН ПОТРАПИТЬ ТУДИ?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений/а", "Раю не існує"],
    hint: "Показує, чи є розуміння суду і відповідальності. Відкриває тему праведності Бога і необхідності примирення."
  },
  {
    q: "ЧИ ВИ ПОТРАПИТЕ В РАЙ?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений/а", "Раю не існує"],
    hint: "Особисте питання. Якщо людина не впевнена — ключовий момент для розмови про впевненість у спасінні через Христа."
  },
  {
    q: "ЧОМУ ВИ ПОТРАПИТЕ В РАЙ, АБО ЧОМУ НІ?",
    type: "radio",
    options: ["Усі туди потраплять", "Я хороша людина", "Бог спас мене через Христа", "Не достатньо хороший/а", "Раю не існує"],
    hint: "Центральне питання тесту. 'Бог спас мене через Христа' — привід для радості. Інші відповіді — привід пояснити Євангеліє."
  },
  {
    q: "ЧИ ВИ Б ХОТІЛИ ЗНАТИ, ЯК НА ЦІ ПИТАННЯ ВІДПОВІДАЄ БІБЛІЯ?",
    type: "radio",
    options: ["Знаю і погоджуюсь", "Знаю і не погоджуюсь", "Не цікаво", "Хотів/ла би довідатись"],

  }
];

var questionsSkeptic = [
  {
    q: "ЩО ЗАВАЖАЄ ВАМ ВІРИТИ В ЄДИНОГО БОГА-ТВОРЦЯ?",
    type: "radio",
    options: ["Протиріччя з наукою", "Зло і страждання у світі", "Брак доказів", "Вірю в багатьох богів, а не одного", "Багато релігій претендують на істину"],
    custom: "Ваша версія",
    hint: "Дізнайтесь головну перешкоду. Це визначає весь подальший діалог. Відповідь 'Вірю в багатьох богів' відкриває розмову про монотеїзм."

  },

    options: ["Так", "Ні", "Не впевнений/а"],

  },
  {
    q: "ЗВІДКИ ВЗЯЛОСЬ ЖИТТЯ НА ЗЕМЛІ?",

    options: ["Випадковість", "Закони природи", "Позаземне походження", "Не впевнений/а"],

  },
  {
    q: "НА ЧОМУ БАЗУЄТЬСЯ ВАША МОРАЛЬНІСТЬ?",

    custom: "Ваш варіант",
    hint: "Якщо мораль — лише еволюція або почуття, вона відносна. Але люди поводяться так, ніби мораль абсолютна. Звідки це?"
  },
  {
    q: "ЧИ ЛЮДСЬКЕ ЖИТТЯ Є ОСОБЛИВІШИМ ЗА ЖИТТЯ РОСЛИН ЧИ ТВАРИН?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений/а"],
    hint: "Якщо так — чому? З еволюційної точки зору ми просто складніші тварини. Особливість людини вказує на образ Божий (Бут. 1:27)."
  },
  {
    q: "НА СКІЛЬКИ ВИ ПЕРЕКОНАНІ, ЩО БОГА НЕ ІСНУЄ?",
    type: "scale",
    hint: "Шкала показує ступінь переконаності. Більшість скептиків — агностики, а не атеїсти. Це відкриває розмову про можливість Бога."
  },
  {
    q: "ЧИ ХОТІЛИ Б ВИ ПОЧУТИ, ЯК ТЕЇСТИ ВІДПОВІДАЮТЬ НА ЦІ ЗАПИТАННЯ?",

    options: ["Так", "Ні"],

  }
];

// ===== 13 ПРОФІЛІВ =====
var profiles = {

    verse: "Бо невидиме Його, вічна сила Його і Божество, від створення світу через розгляд творінь стають видимими.",

  },
  "humanist": {
    emoji: "🌿",
    title: "ГУМАНІСТ",
    desc: "Ви вірите в людину як найвищу цінність і джерело моралі.",
    verse: "Що є людина, що Ти пам'ятаєш про неї, і що є син людський, що Ти відвідуєш його?",
    ref: "Псалом 8:4"
  },
  "atheist": {
    emoji: "⚡",
    title: "АТЕЇСТ",
    desc: "Ви переконані, що Бога не існує, і живете згідно з цим.",
    verse: "Сказав безумець у серці своєму: немає Бога.",
    ref: "Псалом 14:1"
  },
  "agnostic": {
    emoji: "🌫️",
    title: "АГНОСТИК",
    desc: "Ви не знаєте, чи існує Бог, і вважаєте це питання відкритим.",
    verse: "Шукайте Господа, поки Він може бути знайдений, кличте до Нього, поки Він близько.",

  },
  "polytheist": {
    emoji: "👑",
    title: "ПОЛІТЕЇСТ",
    desc: "Ви вірите в існування багатьох богів або вищих істот.",
    verse: "Господь, Бог наш, Господь один є.",
    ref: "Повторення Закону 6:4"
  },
  "apatheist": {
    emoji: "😶",
    title: "АПАТЕЇСТ",
    desc: "Питання про Бога вас просто не цікавить.",

  }
};

// ===== СТАН =====
var phase = "common";
var commonIdx = 0;
var branchIdx = 0;
var branchQuestions = [];
var commonAnswers = [null, null];
var branchAnswers = [];
var totalQuestions = 10;

// ===== ІНІЦІАЛІЗАЦІЯ =====
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("btnStart").addEventListener("click", startTest);
  document.getElementById("btnNext").addEventListener("click", nextQuestion);
  document.getElementById("btnRestart").addEventListener("click", restartTest);
  document.getElementById("hintCloseBtn").addEventListener("click", closeHintBtn);
  document.getElementById("hintOverlay").addEventListener("click", function(e) {
    if (e.target === this) closeHintBtn();
  });
});

function startTest() {
  phase = "common";
  commonIdx = 0;
  branchIdx = 0;
  branchQuestions = [];
  commonAnswers = [null, null];
  branchAnswers = [];
  showScreen("question-screen");
  renderCurrent();
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function getProgress() {
  if (phase === "common") return Math.round(((commonIdx + 1) / totalQuestions) * 100);
  var done = 2 + branchIdx + 1;
  return Math.round((done / totalQuestions) * 100);
}

function getQuestionNumber() {
  if (phase === "common") return commonIdx + 1;
  return 2 + branchIdx + 1;
}

function renderCurrent() {
  var q = phase === "common" ? questionsCommon[commonIdx] : branchQuestions[branchIdx];
  var num = getQuestionNumber();
  document.getElementById("progressBar").style.width = getProgress() + "%";
  var body = document.getElementById("qBody");
  var savedAns = phase === "common" ? commonAnswers[commonIdx] : branchAnswers[branchIdx];

  var html =
    "<div class=\"q-label-row\">" +
      "<div class=\"q-label\">ЗАПИТАННЯ " + num + "</div>" +
      "<button class=\"q-hint-btn\" id=\"hintBtn\">?</button>" +
    "</div>" +
    "<div class=\"q-text\">" + q.q + "</div>" +
    "<div class=\"q-options-wrap\">";

  if (q.type === "radio") {
    html += "<div class=\"q-options\">";
    for (var i = 0; i < q.options.length; i++) {
      var chk = (savedAns && savedAns.value === q.options[i]) ? " checked" : "";
      html += "<label class=\"q-option\"><input type=\"radio\" name=\"qr\" value=\"" + q.options[i].replace(/"/g,"&quot;") + "\"" + chk + "> " + q.options[i] + "</label>";
    }
    if (q.custom) {
      var cVal = (savedAns && savedAns.custom) ? savedAns.custom : "";
      var cChk = (savedAns && savedAns.value === "__custom__") ? " checked" : "";
      html += "<label class=\"q-option\"><input type=\"radio\" name=\"qr\" value=\"__custom__\"" + cChk + "> " +
        "<input class=\"q-custom-input\" id=\"customInput\" type=\"text\" placeholder=\"" + q.custom + "\" value=\"" + cVal + "\"></label>";
    }
    html += "</div>";
  } else if (q.type === "scale") {
    var savedVal = savedAns ? savedAns.value : null;
    html += "<div class=\"q-scale\">";
    for (var j = 1; j <= 10; j++) {
      var isSel = (savedVal == j) ? " selected" : "";
      html += "<button class=\"scale-btn" + isSel + "\" data-val=\"" + j + "\">" + j + "</button>";
    }
    html += "</div>";
  }

  html += "</div>";
  var savedNotes = (savedAns && savedAns.notes) ? savedAns.notes : "";
  html += "<textarea class=\"q-notes\" placeholder=\"Нотатки ведучого...\">" + savedNotes + "</textarea>";
  body.innerHTML = html;

  // Прив'язуємо підказку
  document.getElementById("hintBtn").addEventListener("click", function() {
    showHint(q.hint);
  });

  // Прив'язуємо шкалу
  var scaleBtns = body.querySelectorAll(".scale-btn");
  for (var k = 0; k < scaleBtns.length; k++) {
    scaleBtns[k].addEventListener("click", function() {
      var all = body.querySelectorAll(".scale-btn");
      for (var m = 0; m < all.length; m++) all[m].classList.remove("selected");
      this.classList.add("selected");
    });
  }
}

function nextQuestion() {
  saveCurrentAnswer();

  if (phase === "common") {
    if (commonIdx === 0) {
      commonIdx = 1;
      renderCurrent();
      return;
    }
    if (commonIdx === 1) {
      var ans2 = commonAnswers[1];
      var val = ans2 ? ans2.value : "";
      if (val === "Так, це Бог") {
        phase = "theist";
        branchQuestions = questionsTheist;
      } else {
        phase = "skeptic";
        branchQuestions = questionsSkeptic;
      }
      branchIdx = 0;
      branchAnswers = new Array(branchQuestions.length).fill(null);
      renderCurrent();
      return;
    }
  }

  if (phase === "theist" || phase === "skeptic") {
    branchIdx++;
    if (branchIdx >= branchQuestions.length) {
      showResult();
      return;
    }
    renderCurrent();
  }
}

function saveCurrentAnswer() {
  var q = phase === "common" ? questionsCommon[commonIdx] : branchQuestions[branchIdx];
  var notesEl = document.querySelector(".q-notes");
  var notes = notesEl ? notesEl.value : "";
  var ans;
  if (q.type === "radio") {
    var sel = document.querySelector("input[name=\"qr\"]:checked");
    var ci = document.getElementById("customInput");
    ans = { value: sel ? sel.value : null, custom: ci ? ci.value : "", notes: notes };
  } else {
    var sb = document.querySelector(".scale-btn.selected");
    ans = { value: sb ? sb.dataset.val : null, notes: notes };
  }
  if (phase === "common") commonAnswers[commonIdx] = ans;
  else branchAnswers[branchIdx] = ans;
}

function showHint(text) {
  document.getElementById("hintText").textContent = text;
  document.getElementById("hintOverlay").classList.add("active");
}

function closeHintBtn() {
  document.getElementById("hintOverlay").classList.remove("active");
}

// ===== АЛГОРИТМ ПРОФІЛІВ =====
function determineProfile() {
  if (phase === "theist") {
    // Пит. 8 (branchIdx 7) — остання відповідь
    var ans8 = branchAnswers[7] ? branchAnswers[7].value : "";
    // Пит. 7 (branchIdx 6) — чому потрапите в рай
    var ans7 = branchAnswers[6] ? branchAnswers[6].value : "";
    // Пит. 3 (branchIdx 2) — шкала задоволення вимог
    var ans3val = branchAnswers[2] ? parseInt(branchAnswers[2].value) : 5;

    // Пріоритет: Пит.8 найвищий
    if (ans8 === "Знаю і погоджуюсь" || ans7 === "Бог спас мене через Христа") {
      return "christian";
    }
    if (ans8 === "Хотів/ла би довідатись" || ans8 === "Знаю і не погоджуюсь") {
      // Перевіряємо чи деїст
      var ans1 = branchAnswers[0] ? branchAnswers[0].value : "";
      if (ans1 === "Байдужий") return "deist";
      return "panentheist";
    }
    // Якщо "Не цікаво"
    var ans1b = branchAnswers[0] ? branchAnswers[0].value : "";
    if (ans1b === "Безособистісна Енергія") return "pantheist";
    if (ans1b === "Байдужий") return "deist";
    return "panentheist";

  } else {
    // ГІЛКА СКЕПТИКА
    // Пит. 3 (branchIdx 0) — що заважає вірити
    var s0 = branchAnswers[0] ? branchAnswers[0].value : "";
    // Пит. 7 (branchIdx 6) — шкала переконаності (1-10)
    var scaleVal = branchAnswers[6] ? parseInt(branchAnswers[6].value) : 5;
    // Пит. 8 (branchIdx 7) — чи хотіли б почути теїстів
    var s7 = branchAnswers[7] ? branchAnswers[7].value : "";
    // Пит. 1 (commonAnswers[0]) — добро і зло
    var c0 = commonAnswers[0] ? commonAnswers[0].value : "";
    // Пит. 5 (branchIdx 4) — мораль
    var s4 = branchAnswers[4] ? branchAnswers[4].value : "";
    // Пит. 3 (branchIdx 2) — ціль всесвіту
    var s2 = branchAnswers[2] ? branchAnswers[2].value : "";
    // Пит. 6 (branchIdx 5) — людське життя особливе?
    var s5 = branchAnswers[5] ? branchAnswers[5].value : "";

    // Пріоритет 1: Політеїст
    if (s0 === "Вірю в багатьох богів, а не одного") return "polytheist";

    // Пріоритет 2: Апатеїст — байдужість до питання
    if (s7 === "Ні" && c0 === "Не впевнений/а" && s2 === "Ні") return "apatheist";

    // Пріоритет 3: Атеїст — висока переконаність (8-10)
    if (scaleVal >= 8) return "atheist";

    // Пріоритет 4: Агностик — низька переконаність (1-4)
    if (scaleVal <= 4) return "agnostic";

    // Пріоритет 5: Нігіліст
    if (s4 === "Ні на чому" && s2 === "Ні" && s5 === "Ні") return "nihilist";

    // Пріоритет 6: Релятивіст
    if (c0 === "Ні, це просто суспільні домовленості" && s4 === "Соціальні норми") return "relativist";

    // Пріоритет 7: Натураліст
    if (s4 === "Еволюція" || s4 === "Соціальні норми") return "naturalist";

    // Пріоритет 8: Гуманіст
    if (s5 === "Так" && s7 === "Так") return "humanist";

    // Пріоритет 9: Екзистенціаліст
    if (s2 === "Так") return "existentialist";

    // За замовчуванням
    if (scaleVal >= 6) return "atheist";
    return "agnostic";
  }
}

function showResult() {
  var key = determineProfile();
  var p = profiles[key];
  showScreen("result-screen");
  document.getElementById("resultEmoji").textContent = p.emoji;
  document.getElementById("resultTitle").textContent = p.title;
  document.getElementById("resultDesc").textContent = p.desc;
  document.getElementById("resultVerse").textContent = p.verse;
  document.getElementById("resultRef").textContent = p.ref;
}

function restartTest() {
  showScreen("home");
}
</script>
